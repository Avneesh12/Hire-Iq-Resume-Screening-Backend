services:
  - type: web
    name: hireiq-api
    env: python
    plan: free
    
    # Build command
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt
    
    # Start command (runs both app and celery worker)
    startCommand: bash start.sh
    
    # Python version
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "8000"
    
    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30
